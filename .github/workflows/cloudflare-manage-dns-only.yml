# One-off: set master.masjidweb.com CNAME to DNS-only (grey cloud) in Cloudflare.
# (Legacy: same script works for manage.* via RECORD_NAME=manage.masjidweb.com)
# Add repository secret CLOUDFLARE_API_TOKEN (Zone DNS Edit for masjidweb.com), then:
# Actions → Cloudflare manage DNS only → Run workflow.

name: Cloudflare manage DNS only

on:
  workflow_dispatch:

jobs:
  dns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update -qq && sudo apt-get install -y -qq jq

      - name: Set template builder subdomain to DNS-only
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: bash scripts/cloudflare_manage_dns_only.sh

      - name: Verify HTTPS (no redirect loop)
        run: |
          set +e
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-redirs 15 -L "https://master.masjidweb.com/")
          ex=$?
          set -e
          echo "curl exit=${ex} final_http=${code}"
          if [[ "${ex}" -ne 0 ]]; then
            echo "curl failed (often exit 47 = redirect loop). Wait for DNS propagation and re-run, or check Cloudflare proxy is off for master."
            exit 1
          fi
          test "${code}" -ge 200 && test "${code}" -lt 400
