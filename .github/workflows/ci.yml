# Full verification: TypeScript, Vitest, ESLint, and production builds.
# Runs on every push and pull request. No secrets required.

name: CI

on:
  push:
    branches: [main, master, mw-admin-dash]
  pull_request:
    branches: [main, master, mw-admin-dash]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  admin-dashboard:
    name: admin-dashboard-v2
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-dashboard-v2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin-dashboard-v2/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  ycode:
    name: ycode-masjidweb
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ycode-masjidweb
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ycode-masjidweb/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run lint
      - run: npm run build
