# Full verification: TypeScript, Vitest, ESLint, and production builds.
# Runs on every push and pull request. No secrets required.
# Note: ycode-masjidweb has its own CI in its own repo (submodule).

name: CI

on:
  push:
    branches: [main, master]
    paths:
      - "admin-dashboard-v2/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  admin-dashboard:
    name: admin-dashboard-v2
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-dashboard-v2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin-dashboard-v2/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
